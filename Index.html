<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FORJA CF — Carbon Fiber Drone Chassis</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #050505;
      --carbon: #0d0d0d;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --white: #f0ede8;
      --gray: #5a5a5a;
      --red-col: #ce1126;
      --yellow-col: #fcd116;
      --blue-col: #003893;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* Carbon fiber texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.012) 2px,
          rgba(255,255,255,0.012) 4px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.012) 2px,
          rgba(255,255,255,0.012) 4px
        );
      background-size: 8px 8px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .nav-logo span { color: var(--gold); }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .nav-links a {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }

    .nav-cta {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .nav-cta:hover { background: var(--gold); color: var(--black); }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 48px 80px;
      overflow: hidden;
    }

    /* Diagonal gold accent line */
    .hero::after {
      content: '';
      position: absolute;
      top: -10%;
      right: 18%;
      width: 1px;
      height: 130%;
      background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
      opacity: 0.25;
      transform: rotate(8deg);
    }

    .hero-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 13vw, 14rem);
      line-height: 0.9;
      letter-spacing: 0.03em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }

    .hero-title .accent { color: var(--gold); }

    .hero-subtitle {
      margin-top: 36px;
      max-width: 480px;
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(240,237,232,0.55);
      opacity: 0;
      animation: fadeUp 0.9s 0.6s forwards;
    }

    .hero-actions {
      margin-top: 52px;
      display: flex;
      gap: 20px;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.9s 0.8s forwards;
    }

    .btn-primary {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 16px 40px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.3s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

    .btn-ghost {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(240,237,232,0.3);
      padding: 16px 40px;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .btn-ghost:hover { border-color: var(--white); }

    /* Animated drone wireframe */
    .hero-visual {
      position: absolute;
      right: -2%;
      top: 50%;
      transform: translateY(-50%);
      width: 52%;
      opacity: 0;
      animation: fadeIn 1.2s 1s forwards;
    }

    .drone-svg {
      width: 100%;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.12));
    }

    /* Stats bar */
    .hero-stats {
      position: absolute;
      bottom: 48px;
      left: 48px;
      display: flex;
      gap: 64px;
      opacity: 0;
      animation: fadeUp 0.9s 1.1s forwards;
    }

    .stat-item { display: flex; flex-direction: column; gap: 6px; }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* Colombian flag stripe */
    .colombia-stripe {
      height: 4px;
      background: linear-gradient(to right,
        var(--yellow-col) 0%, var(--yellow-col) 40%,
        var(--blue-col) 40%, var(--blue-col) 60%,
        var(--red-col) 60%, var(--red-col) 100%
      );
      width: 80px;
      margin: 20px 0 0;
    }

    /* ── SECTION BASE ── */
    section {
      position: relative;
      z-index: 1;
      padding: 120px 48px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 5vw, 5.5rem);
      line-height: 1;
      letter-spacing: 0.04em;
    }

    /* ── FEATURES ── */
    .features {
      background: var(--carbon);
      border-top: 1px solid rgba(201,168,76,0.1);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }

    .features-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 80px;
      flex-wrap: wrap;
      gap: 32px;
    }

    .features-desc {
      max-width: 360px;
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(240,237,232,0.5);
      font-weight: 300;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .feature-card {
      background: var(--black);
      padding: 48px 40px;
      border: 1px solid rgba(255,255,255,0.04);
      transition: border-color 0.4s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px;
      height: 0;
      background: var(--gold);
      transition: height 0.4s;
    }
    .feature-card:hover::before { height: 100%; }
    .feature-card:hover { border-color: rgba(201,168,76,0.2); transform: translateY(-4px); }

    .feature-icon {
      font-size: 1.8rem;
      margin-bottom: 28px;
    }

    .feature-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      color: var(--white);
    }

    .feature-text {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(240,237,232,0.45);
    }

    /* ── SPECS ── */
    .specs-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .specs-table {
      width: 100%;
      border-collapse: collapse;
    }

    .specs-table tr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s;
    }
    .specs-table tr:hover { background: rgba(201,168,76,0.04); }

    .specs-table td {
      padding: 18px 0;
      font-size: 0.95rem;
    }

    .specs-table td:first-child {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--gray);
      text-transform: uppercase;
      width: 50%;
    }

    .specs-table td:last-child {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--white);
      text-align: right;
    }

    .specs-visual {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .spec-bar-item { display: flex; flex-direction: column; gap: 10px; }

    .spec-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .spec-bar-name {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .spec-bar-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--gold);
    }

    .spec-bar-track {
      height: 2px;
      background: rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .spec-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold), var(--gold-light));
      animation: barGrow 1.2s ease-out forwards;
      transform-origin: left;
      transform: scaleX(0);
    }

    @keyframes barGrow {
      to { transform: scaleX(1); }
    }

    /* ── ORIGIN ── */
    .origin {
      background: linear-gradient(135deg, #080808 0%, #0f0a02 100%);
      border-top: 1px solid rgba(201,168,76,0.1);
    }

    .origin-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: center;
    }

    .origin-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      padding: 10px 20px;
      margin-bottom: 32px;
    }

    .origin-badge-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .origin-body {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.85;
      color: rgba(240,237,232,0.55);
      margin-top: 28px;
    }

    .origin-map {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-circle {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.15);
      position: relative;
      animation: rotate 20s linear infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-circle::before {
      content: '';
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px dashed rgba(201,168,76,0.08);
    }

    .map-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 20px var(--gold), 0 0 60px rgba(201,168,76,0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px var(--gold), 0 0 60px rgba(201,168,76,0.4); }
      50% { box-shadow: 0 0 30px var(--gold), 0 0 100px rgba(201,168,76,0.6); }
    }

    .map-label {
      position: absolute;
      bottom: -40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: var(--gold);
    }

    /* ── CTA ── */
    .cta-section {
      text-align: center;
      padding: 140px 48px;
      position: relative;
      overflow: hidden;
    }

    .cta-section::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 8vw, 8rem);
      line-height: 0.95;
      margin-bottom: 32px;
    }

    .cta-sub {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(240,237,232,0.45);
      margin-bottom: 52px;
      letter-spacing: 0.05em;
    }

    .cta-input-group {
      display: flex;
      gap: 0;
      justify-content: center;
      max-width: 480px;
      margin: 0 auto;
    }

    .cta-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-right: none;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      padding: 16px 20px;
      outline: none;
    }
    .cta-input::placeholder { color: var(--gray); }
    .cta-input:focus { border-color: rgba(201,168,76,0.4); }

    .cta-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 16px 32px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.3s;
    }
    .cta-btn:hover { background: var(--gold-light); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
    }
    .footer-logo span { color: var(--gold); }

    .footer-copy {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--gray);
      text-transform: uppercase;
    }

    .footer-flag {
      height: 3px;
      width: 48px;
      background: linear-gradient(to right,
        var(--yellow-col) 0%, var(--yellow-col) 40%,
        var(--blue-col) 40%, var(--blue-col) 60%,
        var(--red-col) 60%, var(--red-col) 100%
      );
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      .hero { padding: 100px 24px 60px; }
      .hero-visual { display: none; }
      .hero-stats { left: 24px; gap: 32px; flex-wrap: wrap; }
      section { padding: 80px 24px; }
      .features-grid { grid-template-columns: 1fr; gap: 2px; }
      .specs-inner { grid-template-columns: 1fr; gap: 40px; }
      .origin-inner { grid-template-columns: 1fr; gap: 60px; }
      .origin-map { display: none; }
      footer { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">FORJA<span>CF</span></div>
  <ul class="nav-links">
    <li><a href="#features">Technology</a></li>
    <li><a href="#specs">Specs</a></li>
    <li><a href="#origin">Origin</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="nav-cta">Request Quote</button>
</nav>

<!-- HERO -->
<section class="hero">
  <p class="hero-eyebrow">// Colombian precision engineering</p>
  <h1 class="hero-title">
    BUILT<br>
    FROM<br>
    <span class="accent">FIBER.</span>
  </h1>
  <div class="colombia-stripe" style="opacity:0;animation:fadeUp 0.9s 0.55s forwards;"></div>
  <p class="hero-subtitle">
    High-performance carbon fiber drone chassis engineered and handcrafted in Colombia.
    Every frame is a fusion of aerospace-grade materials and South American manufacturing excellence.
  </p>
  <div class="hero-actions">
    <button class="btn-primary">Explore Models</button>
    <button class="btn-ghost">View Specs</button>
  </div>

  <!-- SVG Drone Wireframe -->
  <div class="hero-visual">
    <svg class="drone-svg" viewBox="0 0 700 500" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Center body -->
      <rect x="295" y="215" width="110" height="70" rx="4" stroke="#c9a84c" stroke-width="1.2" opacity="0.9"/>
      <rect x="310" y="228" width="80" height="44" rx="2" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>
      <!-- Center cross detail -->
      <line x1="295" y1="250" x2="405" y2="250" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
      <line x1="350" y1="215" x2="350" y2="285" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

      <!-- Arms -->
      <!-- Top-left arm -->
      <line x1="295" y1="220" x2="155" y2="120" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
      <line x1="290" y1="225" x2="150" y2="125" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
      <!-- Top-right arm -->
      <line x1="405" y1="220" x2="545" y2="120" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
      <line x1="410" y1="225" x2="550" y2="125" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
      <!-- Bottom-left arm -->
      <line x1="295" y1="280" x2="155" y2="380" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
      <line x1="290" y1="275" x2="150" y2="375" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>
      <!-- Bottom-right arm -->
      <line x1="405" y1="280" x2="545" y2="380" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
      <line x1="410" y1="275" x2="550" y2="375" stroke="#c9a84c" stroke-width="0.5" opacity="0.25"/>

      <!-- Motor mounts - circles -->
      <!-- TL -->
      <circle cx="142" cy="112" r="40" stroke="#c9a84c" stroke-width="1.2" opacity="0.85"/>
      <circle cx="142" cy="112" r="28" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
      <circle cx="142" cy="112" r="8" fill="#c9a84c" opacity="0.6"/>
      <!-- TR -->
      <circle cx="558" cy="112" r="40" stroke="#c9a84c" stroke-width="1.2" opacity="0.85"/>
      <circle cx="558" cy="112" r="28" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
      <circle cx="558" cy="112" r="8" fill="#c9a84c" opacity="0.6"/>
      <!-- BL -->
      <circle cx="142" cy="388" r="40" stroke="#c9a84c" stroke-width="1.2" opacity="0.85"/>
      <circle cx="142" cy="388" r="28" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
      <circle cx="142" cy="388" r="8" fill="#c9a84c" opacity="0.6"/>
      <!-- BR -->
      <circle cx="558" cy="388" r="40" stroke="#c9a84c" stroke-width="1.2" opacity="0.85"/>
      <circle cx="558" cy="388" r="28" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
      <circle cx="558" cy="388" r="8" fill="#c9a84c" opacity="0.6"/>

      <!-- Spinning prop lines - TL -->
      <line x1="102" y1="112" x2="182" y2="112" stroke="#e8c96a" stroke-wid
